name: BoardEffect
kind: company
description: BoardEffect is a board management (board portal) platform for meetings,
  agendas, board books, document libraries, committees, workrooms, surveys, and
  voting, purpose-built for mission-driven organizations such as nonprofits,
  healthcare systems, higher education institutions, foundations, and credit unions.
  BoardEffect is owned by Diligent and is delivered as part of the Diligent One
  Platform. It does not publish a self-serve public developer API - integrations are
  handled through a customer-facing Integration Panel (SSO plus documented web
  services) provisioned per tenant, and the separate Diligent Developer Portal
  (developer.diligent.com) exposes APIs for the Diligent One GRC platform rather than
  for BoardEffect's board-management data. Pricing is contact-sales only (annual
  subscription, tiered by users).
